<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
</head>
<body style="margin:0;padding:0;background:#f6f6f6;font-family:Georgia,serif;">
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding:40px 0;">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:6px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">

          <!-- Logo / Header -->
          <tr>
            <td style="background:#1a1a2e;padding:32px 48px;text-align:center;">
              <img src="{{image:company_logo}}" alt="Logo" height="48" style="display:inline-block;max-height:48px;">
            </td>
          </tr>

          <!-- Hero image -->
          <tr>
            <td>
              <img src="{{image:hero_image}}" alt="" width="600" style="display:block;width:100%;">
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px 48px 24px;">
              <h1 style="margin:0 0 12px;font-size:28px;color:#1a1a2e;line-height:1.3;">Welcome, {{first_name}}!</h1>
              <div style="font-size:15px;color:#555;line-height:1.8;">{{welcome_message}}</div>
            </td>
          </tr>

          <!-- CTA -->
          <tr>
            <td style="padding:8px 48px 40px;text-align:center;">
              <a href="{{cta_url}}" style="display:inline-block;background:#e63946;color:#fff;text-decoration:none;padding:16px 40px;border-radius:4px;font-size:14px;font-family:Arial,sans-serif;letter-spacing:0.08em;text-transform:uppercase;font-weight:bold;">
                {{cta_label}}
              </a>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f9f9f9;border-top:1px solid #eee;padding:24px 48px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#aaa;font-family:Arial,sans-serif;line-height:1.6;">
                {{footer_text}}
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
