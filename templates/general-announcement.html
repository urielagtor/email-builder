<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>{{email_title}}</title>
  <!--[if mso]>
  <noscript><xml><o:OfficeDocumentSettings><o:AllowPNG/><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
  <![endif]-->
  <style type="text/css">
    body, table, td, a { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    table, td { mso-table-lspace:0pt; mso-table-rspace:0pt; border-collapse:collapse; }
    img { -ms-interpolation-mode:bicubic; border:0; height:auto; line-height:100%; outline:none; text-decoration:none; display:block; }
    body { margin:0 !important; padding:0 !important; background-color:#f0f2f7; width:100% !important; }
    a { color:inherit; text-decoration:none; }
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Montserrat:wght@400;600;700;800;900&display=swap');
  </style>
</head>
<body style="margin:0;padding:0;background-color:#f0f2f7;width:100%;">

<div style="display:none;font-size:1px;color:#f0f2f7;line-height:1px;max-height:0px;max-width:0px;opacity:0;overflow:hidden;">{{preheader_text}}</div>

<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" bgcolor="#f0f2f7">
  <tr>
    <td align="center" style="padding:24px 12px;">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="620" style="max-width:620px;width:100%;background-color:#ffffff;">

        <tr><td bgcolor="#F5C42C" height="8" style="background-color:#F5C42C;font-size:0;line-height:0;">&nbsp;</td></tr>
        <tr><td bgcolor="#0D2750" height="4" style="background-color:#0D2750;font-size:0;line-height:0;">&nbsp;</td></tr>

        <!-- Header -->
        <tr>
          <td bgcolor="#ffffff" align="center" style="padding:36px 40px 32px 40px;">
            <img src="{{image:logo}}" alt="{{org_name}}" width="80" style="display:block;margin:0 auto 18px auto;width:80px;height:auto;" />
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="margin:0 auto 14px auto;">
              <tr>
                <td bgcolor="#0D2750" style="border-radius:50px;padding:5px 18px;">
                  <p style="margin:0;font-family:'Montserrat',Arial,sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;color:#F5C42C;text-transform:uppercase;line-height:20px;">{{institution_name}}</p>
                </td>
              </tr>
            </table>
            <h1 style="margin:0 0 10px 0;font-family:'Montserrat',Arial,sans-serif;font-size:36px;font-weight:900;color:#0D2750;line-height:1.1;letter-spacing:-0.5px;">{{headline}}</h1>
            <p style="margin:0;font-family:'Nunito',Arial,sans-serif;font-size:15px;font-weight:700;color:#1a3d6e;line-height:24px;">{{subheadline}}</p>
          </td>
        </tr>

        <tr><td bgcolor="#0D2750" height="4" style="font-size:0;line-height:0;">&nbsp;</td></tr>
        <tr><td bgcolor="#F5C42C" height="6" style="font-size:0;line-height:0;">&nbsp;</td></tr>
        <tr><td bgcolor="#6aaee0" height="4" style="font-size:0;line-height:0;">&nbsp;</td></tr>

        <!-- Body -->
        <tr>
          <td bgcolor="#ffffff" style="padding:40px 40px 36px 40px;">
            <p style="margin:0 0 14px 0;font-family:'Montserrat',Arial,sans-serif;font-size:20px;font-weight:800;color:#0D2750;line-height:1.3;">{{greeting}}</p>
            <div style="font-family:'Nunito',Arial,sans-serif;font-size:16px;font-weight:600;color:#334155;line-height:1.75;margin:0 0 28px 0;">{{body_content}}</div>

            <!-- CTA -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="margin:0 auto;">
              <tr>
                <td align="center" bgcolor="#F5C42C" style="border-radius:50px;">
                  <!--[if mso]>
                  <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{cta_url}}" style="height:52px;v-text-anchor:middle;width:260px;" arcsize="50%" stroke="f" fillcolor="#F5C42C">
                    <w:anchorlock/><center style="color:#0D2750;font-family:Arial,sans-serif;font-size:16px;font-weight:700;">{{cta_label}} &rarr;</center>
                  </v:roundrect>
                  <![endif]-->
                  <!--[if !mso]><!-->
                  <a href="{{cta_url}}" target="_blank" style="display:inline-block;padding:16px 40px;font-family:'Montserrat',Arial,sans-serif;font-size:16px;font-weight:800;color:#0D2750;text-decoration:none;border-radius:50px;">{{cta_label}} &rarr;</a>
                  <!--<![endif]-->
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Closing -->
        <tr>
          <td bgcolor="#f8fafc" align="center" style="padding:28px 40px;text-align:center;">
            <p style="margin:0 0 10px 0;font-family:'Montserrat',Arial,sans-serif;font-size:15px;font-weight:800;color:#0D2750;line-height:1.5;font-style:italic;">{{scripture_quote}}</p>
            <div style="font-family:'Nunito',Arial,sans-serif;font-size:14px;font-weight:600;color:#475569;line-height:1.7;">{{closing_message}}</div>
          </td>
        </tr>

        <tr><td bgcolor="#6aaee0" height="4" style="font-size:0;line-height:0;">&nbsp;</td></tr>
        <tr><td bgcolor="#F5C42C" height="6" style="font-size:0;line-height:0;">&nbsp;</td></tr>
        <tr><td bgcolor="#0D2750" height="4" style="font-size:0;line-height:0;">&nbsp;</td></tr>

        <!-- Footer -->
        <tr>
          <td bgcolor="#ffffff" align="center" style="padding:28px 40px 32px 40px;text-align:center;">
            <img src="{{image:logo}}" alt="CF Logo" width="44" style="display:block;margin:0 auto 12px auto;width:44px;height:auto;" />
            <p style="margin:0 0 4px 0;font-family:'Montserrat',Arial,sans-serif;font-size:12px;font-weight:800;color:#0D2750;letter-spacing:2px;text-transform:uppercase;line-height:20px;">{{org_name}}</p>
            <p style="margin:0 0 4px 0;font-family:'Nunito',Arial,sans-serif;font-size:11px;font-weight:600;color:#64748b;line-height:18px;">{{org_location}}</p>
            <p style="margin:10px 0 0 0;font-family:'Nunito',Arial,sans-serif;font-size:11px;font-weight:600;color:#94a3b8;line-height:18px;">{{footer_note}}</p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
